name: Laravel CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Install Node locally (for Vite build)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install NPM dependencies and build assets
      - name: Build frontend assets
        run: |
          npm install
          npm run build

      # 4️⃣ Build Laravel optimized autoload
      - name: Install Composer dependencies
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=./ --filename=composer
          php composer.phar install --no-dev --optimize-autoloader

      # 5️⃣ Copy private EC2 key to Bastion temporarily
      - name: Copy private EC2 key to Bastion
        run: |
          echo "${{ secrets.PRIVATE_EC2_KEY }}" > private-ec2.pem
          chmod 600 private-ec2.pem
          scp -o StrictHostKeyChecking=no -i ${{ secrets.BASTION_KEY }} private-ec2.pem ec2-user@${{ secrets.BASTION_IP }}:/home/ec2-user/private-ec2.pem

      # 6️⃣ Deploy via Bastion to private EC2
      - name: Deploy to private EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BASTION_IP }}
          username: ec2-user
          key: ${{ secrets.BASTION_KEY }}
          script: |
            # Copy private key permissions
            ssh -i /home/ec2-user/private-ec2.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.PRIVATE_EC2_IP }} '
              set -e
              cd /var/www/html/test-project

              echo "Pull latest code..."
              git reset --hard
              git clean -fd
              git pull origin main

              echo "Install Composer dependencies..."
              composer install --no-dev --optimize-autoloader

              echo "Build assets on server (optional if not pre-built)..."
              npm install
              npm run build

              echo "Run migrations..."
              php artisan migrate --force

              echo "Clear caches..."
              php artisan config:clear
              php artisan route:clear
              php artisan view:clear

              echo "Deployment complete!"
            '